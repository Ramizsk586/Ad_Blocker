<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YT Ad Blocker Pro</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <h1>YT Ad Blocker Pro</h1>
      <span id="status-dot" class="status-dot active"></span>
    </header>

    <section class="toggle-section">
      <span class="toggle-label">Protection</span>
      <label class="switch" for="toggle-switch">
        <input type="checkbox" id="toggle-switch" checked />
        <span class="slider"></span>
      </label>
      <span id="status-text" class="toggle-state">Active</span>
    </section>

    <section class="stats-grid">
      <article class="stat-card primary">
        <div id="blocked-count" class="stat-value">0</div>
        <div class="stat-label">Ads Blocked</div>
      </article>
      <article class="stat-card primary">
        <div id="skipped-count" class="stat-value">0</div>
        <div class="stat-label">Ads Skipped</div>
      </article>
    </section>

    <section class="stats-detailed">
      <h3>Detailed Stats</h3>
      <div class="stat-row">
        <span class="stat-name">Pre-roll Ads</span>
        <span id="preroll-count" class="stat-detail">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-name">Mid-roll Ads</span>
        <span id="midroll-count" class="stat-detail">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-name">Display Ads</span>
        <span id="display-count" class="stat-detail">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-name">Overlay Ads</span>
        <span id="overlay-count" class="stat-detail">0</span>
      </div>
    </section>

    <button id="reset-btn" class="reset-btn">Reset Stats</button>

    <footer id="footer-text">Running on YouTube</footer>

    <script src="popup.js"></script>
  </body>
</html>
